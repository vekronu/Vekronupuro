<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* Pages */
.page{
display:none;
height:100vh;
position:relative;
}

#home{
display:block;
background:url("IMG-20251125-WA0089.jpg");
background-size:cover;
background-position:center;
}

/* overlay */
#home::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
}

/* logo */
.logo{
position:absolute;
top:20px;
left:20px;
font-size:22px;
font-weight:900;
font-style:italic;
letter-spacing:1px;
z-index:2;
opacity: 0;
animation: fadeIn 1s ease-out 0.2s forwards;
}

.logo::after{
content:"";
display:block;
width:100%;
height:3px;
background:#4fd1c5;
margin-top:2px;
}

@keyframes fadeIn {
  to { opacity: 1; }
}

/* menu */
.menu-btn{
position:absolute;
top:20px;
right:20px;
font-size:30px;
cursor:pointer;
z-index:3;
transition: transform 0.3s;
}

.menu-btn:hover{
transform: scale(1.1);
}

/* sidebar - FULL SCREEN */
.sidebar{
position:fixed;
right:-100%;
top:0;
width:100%;
height:100%;
background:#0a0a0a;
transition: right 0.5s cubic-bezier(0.77,0,0.175,1);
padding:30px 25px;
z-index:999;
}

.sidebar.active{
right:0;
}

.sidebar-logo{
font-size:28px;
font-weight:900;
font-style:italic;
letter-spacing:1px;
margin-bottom:5px;
}

.sidebar-logo::after{
content:"";
display:block;
width:120px;
height:3px;
background:#4fd1c5;
margin-top:4px;
}

.close{
position:absolute;
right:25px;
top:30px;
font-size:32px;
cursor:pointer;
transition: transform 0.3s;
}

.close:hover{
transform: rotate(90deg);
}

.sidebar ul{
list-style:none;
margin-top:60px;
}

.sidebar li{
padding:22px 0;
border-bottom:1px solid #222;
font-size:26px;
font-weight:600;
cursor:pointer;
opacity: 0;
transform: translateX(30px);
transition: color 0.2s;
position: relative;
}

.sidebar li.active{
color: #4fd1c5;
}

.sidebar li.active::after{
content:"";
position:absolute;
left:0;
bottom:16px;
width:40px;
height:3px;
background:#4fd1c5;
}

/* stagger menu items when sidebar opens */
.sidebar.active li{
animation: slideInRight 0.4s ease-out forwards;
}

.sidebar.active li:nth-child(1) { animation-delay: 0.2s; }
.sidebar.active li:nth-child(2) { animation-delay: 0.3s; }
.sidebar.active li:nth-child(3) { animation-delay: 0.4s; }

@keyframes slideInRight {
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

.sidebar li:hover{
color: #4fd1c5;
}

/* content */
.content{
position:absolute;
bottom:100px;
left:20px;
z-index:2;
}

.content h1{
font-size:35px;
opacity: 0;
transform: translateY(30px);
animation: slideUp 0.8s ease-out 0.3s forwards;
}

.content p{
opacity: 0;
transform: translateY(30px);
animation: slideUp 0.8s ease-out 0.6s forwards;
margin-top: 15px;
}

@keyframes slideUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* social icons */
.social{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
z-index:2;
}

.social a{
display:block;
margin:10px 0;
opacity: 0;
transform: scale(0.5);
animation: popIn 0.4s ease-out forwards;
}

.social a:nth-child(1) { animation-delay: 1s; }
.social a:nth-child(2) { animation-delay: 1.1s; }
.social a:nth-child(3) { animation-delay: 1.2s; }
.social a:nth-child(4) { animation-delay: 1.3s; }
.social a:nth-child(5) { animation-delay: 1.4s; }

@keyframes popIn {
  to {
    opacity: 1;
    transform: scale(1);
  }
}

.social img{
width:40px;
height:40px;
background:white;
padding:8px;
border-radius:50%;
box-shadow: 0 2px 8px rgba(0,0,0,0.3);
transition: transform 0.2s;
}

.social img:hover{
transform: scale(1.1);
}

/* other pages */
#about{
justify-content:center;
align-items:center;
text-align:center;
}

#subscribe{
padding:20px;
overflow:auto;
}

.subscribe-box{
max-width:500px;
margin:auto;
background:#0a0f18;
padding:25px;
border-radius:20px;
margin-top:50px;
}

.subscribe-box h1{
color:#4fd1c5;
margin-bottom:10px;
}

input,select{
width:100%;
padding:15px;
margin:10px 0;
background:#111;
border:1px solid #333;
color:white;
border-radius:10px;
}

label{
display:block;
margin-top:10px;
}

button{
width:100%;
padding:15px;
background:#4fd1c5;
border:none;
border-radius:10px;
margin-top:15px;
font-size:18px;
cursor:pointer;
}

.footer{
position:absolute;
bottom:20px;
left:20px;
z-index:2;
}

</style>

</head>

<script>
function openMenu(){
document.getElementById("sidebar").classList.add("active");
document.body.style.overflow = "hidden";
}

function closeMenu(){
document.getElementById("sidebar").classList.remove("active");
document.body.style.overflow = "auto";
}

function showPage(page, el){
// Update active menu item
document.querySelectorAll(".sidebar li").forEach(li => li.classList.remove("active"));
el.classList.add("active");

document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById(page).style.display="block";
closeMenu();
}
</script>
